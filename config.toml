[theme]
primaryColor = "#f0b429"
backgroundColor = "#0a0b0d"
secondaryBackgroundColor = "#111318"
textColor = "#e8eaf0"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[server]
port = 8501
headless = true
runOnSave = true
enableXsrfProtection = true
